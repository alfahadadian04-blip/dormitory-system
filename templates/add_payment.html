{% extends 'base.html' %}

{% block title %}Record Payment - Dormitory System{% endblock %}

{% block content %}
<div class="card">
    <h2>Record Payment</h2>
    
    <form method="POST">
        <div class="form-group">
            <label>Tenant *</label>
            <select name="tenant_id" required>
                <option value="">Select Tenant</option>
                {% for tenant in tenants %}
                <option value="{{ tenant.id }}">{{ tenant.name }} (Room {{ tenant.room_number or 'N/A' }})</option>
                {% endfor %}
            </select>
        </div>
        
        <div class="form-group">
            <label>Amount ($) *</label>
            <input type="number" name="amount" step="0.01" required>
        </div>
        
        <div class="form-group">
            <label>Payment Date</label>
            <input type="date" name="payment_date">
        </div>
        
        <div class="form-group">
            <label>Payment Month</label>
            <input type="text" name="payment_month" placeholder="e.g., April 2026">
        </div>
        
        <div class="form-group">
            <label>Notes</label>
            <input type="text" name="notes">
        </div>
        
        <button type="submit" class="btn">Record Payment</button>
        <a href="{{ url_for('main.payments') }}" style="margin-left: 10px;">Cancel</a>
    </form>
</div>
{% endblock %}
