{% extends 'base.html' %}

{% block title %}Add Tenant - Dormitory System{% endblock %}

{% block content %}
<div class="card">
    <h2>Add New Tenant</h2>
    
    <form method="POST">
        <div class="form-group">
            <label>Name *</label>
            <input type="text" name="name" required>
        </div>
        
        <div class="form-group">
            <label>Phone</label>
            <input type="text" name="phone">
        </div>
        
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email">
        </div>
        
        <div class="form-group">
            <label>Room Number</label>
            <input type="text" name="room_number">
        </div>
        
        <div class="form-group">
            <label>Move-in Date</label>
            <input type="date" name="move_in_date">
        </div>
        
        <div class="form-group">
            <label>Monthly Rent ($)</label>
            <input type="number" name="rent_amount" step="0.01" value="0">
        </div>
        
        <div class="form-group">
            <label>Status</label>
            <select name="status">
                <option value="active">Active</option>
                <option value="inactive">Inactive</option>
            </select>
        </div>
        
        <button type="submit" class="btn">Add Tenant</button>
        <a href="{{ url_for('main.tenants') }}" style="margin-left: 10px;">Cancel</a>
    </form>
</div>
{% endblock %}
